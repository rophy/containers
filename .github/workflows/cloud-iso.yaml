name: Cloud ISO

on:
  workflow_dispatch:
    inputs:
      iso_url:
        description: 'Full URL to the ISO/image file'
        required: true
        type: string
      image_name:
        description: 'Image path segment (e.g. ubuntu, fedora)'
        required: true
        type: string
      image_tag:
        description: 'Image tag (e.g. noble-20260401)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./cloud-iso
          push: true
          build-args: |
            ISO_URL=${{ inputs.iso_url }}
          tags: ghcr.io/${{ github.repository_owner }}/containers/cloud-iso/${{ inputs.image_name }}:${{ inputs.image_tag }}
